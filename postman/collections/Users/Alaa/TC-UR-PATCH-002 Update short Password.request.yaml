$kind: http-request
url: "{{base_url}}/users/me"
method: PATCH
body:
  type: json
  content: "{\r\n \"password\": \"m\"}"
auth:
  type: bearer
  credentials:
    token: "{{token}}"
scripts:
  - type: afterResponse
    code: "pm.test(\"Status code is 400\", function () {\r

      \    pm.response.to.have.status(400);\r

      });\r

      \r

      pm.test(\"Response contains error message\", function(){\r

      \    const jData=pm.response.json();\r

      \    pm.expect(jData).to.have.property(\"message\");})\r\n"
    language: text/javascript
order: 11000
