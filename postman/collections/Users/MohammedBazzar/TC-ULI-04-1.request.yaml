$kind: http-request
name: TC-ULI-04
url: "{{base_url}}/users/me"
method: DELETE
body:
  type: text
  content: ""
auth:
  type: bearer
  credentials:
    token: "{{TokenExpired}}"
scripts:
  - type: afterResponse
    code: "const responseText = pm.response.text();\r

      \r

      pm.test(\"Status code is 401\", function () {\r

      \    pm.response.to.have.status(401);\r

      });\r

      \r

      pm.test(\"Response message should empty\", function() {\r

      \    pm.expect(responseText).to.contain('Please authenticate.')\r

      });"
    language: text/javascript
order: 17000
