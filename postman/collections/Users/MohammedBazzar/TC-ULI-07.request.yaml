$kind: http-request
url: "{{base_url}}/users/me"
method: DELETE
body:
  type: text
  content: ""
auth:
  type: bearer
  credentials:
    token: "{{tem_token}}"
scripts:
  - type: afterResponse
    code: "const responseText = pm.response.text();\r

      \r

      pm.test(\"Status code is 401\", function () {\r

      \    pm.response.to.have.status(401);\r

      });\r

      \r

      pm.test(\"Response message should empty\", function() {\r

      \    pm.expect(responseText).to.contain('Please authenticate.')\r

      });"
    language: text/javascript
  - type: beforeRequest
    code: "const randomEmail = pm.variables.replaceIn(\"{{$randomEmail}}\");\r

      \r

      const postUserRequest = {\r

      \  url: pm.environment.get(\"base_url\") + \"/users\",\r

      \  method: 'POST',\r

      \  header: {\r

      \    'Content-Type': 'application/json'\r

      \  },\r

      \  body: {\r

      \    mode: 'raw',\r

      \    raw: JSON.stringify({\r

      \        \"firstName\": \"Test\",\r

      \        \"lastName\": \"User\",\r

      \        \"email\": randomEmail,\r

      \        \"password\": \"myPassword\"\r

      \    })\r

      \  }\r

      };\r

      \r

      try {\r

      \    const res = await pm.sendRequest(postUserRequest);\r

      \    pm.environment.set('tem_token', res.json().token);\r

      } catch (err) {\r

      \    console.log(err);\r

      }\r

      \r

      const deleteRequest = {\r

      \    url: pm.environment.get(\"base_url\") + \"/users/me\",\r

      \    method: 'DELETE',\r

      \    header: {\r

      \        'Content-Type': 'application/json',\r

      \        'Authorization': `Bearer ${pm.environment.get(\"tem_token\")}`,\r

      \    },\r

      }\r

      \r

      try {\r

      \    const res = await pm.sendRequest(deleteRequest);\r

      \    if (res.code == 200) {\r

      \        console.log(\"logged out succ\")\r

      \    } else {\r

      \        console.error(\"lool\");\r

      \    } \r

      } catch(err) {\r

      \    console.log(\"err\")\r

      };"
    language: text/javascript
order: 20000
