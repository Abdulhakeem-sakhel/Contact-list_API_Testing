$kind: http-request
url: "{{base_url}}/contacts/{{contactId}}"
method: PUT
body:
  type: json
  content: "{{requestBody}}"
auth:
  type: bearer
  credentials:
    token: "{{token}}"
scripts:
  - type: beforeRequest
    code: "const randomEmail = pm.variables.replaceIn(\"{{$randomEmail}}\");\r

      \r

      const postRequest = {\r

      \  url: pm.environment.get(\"base_url\") + \"/contacts\",\r

      \  method: 'POST',\r

      \  header: {\r

      \    'Content-Type': 'application/json',\r

      \    'Authorization': `Bearer ${pm.environment.get(\"token\")}`,\r

      \  },\r

      \  body: {\r

      \    mode: 'raw',\r

      \    raw: JSON.stringify({\r

      \        \"firstName\": \"Test\",\r

      \        \"lastName\": \"User\",\r

      \        \"email\": randomEmail,\r

      \        \"password\": \"myPassword\"\r

      \    })\r

      \  }\r

      };\r

      \r

      pm.sendRequest(postRequest, (err, res) => {\r

      \    if (err) {\r

      \        console.log(err);\r

      \    } else {\r

      \        if (res.code === 201) {\r

      \            console.log(\"Contact created successfully:\", res.json());\r

      \            pm.environment.set(\"contactId\", res.json()._id);\r

      \        } else {\r

      \            // Log exactly what went wrong if it wasn't a 201\r

      \            console.error(\r

      \                \"Failed to create contact. Status:\",\r

      \                res.code,\r

      \                \"Response:\",\r

      \                res.text()\r

      \            );\r

      \        }\r

      \    }\r

      });\r

      \r

      \r

      let requestBody = {\r

      \  firstName: \"Abd\",\r

      \  lastName: \"Sakhel\",\r

      \  email: randomEmail,\r

      \  phone: \"8005554242\",\r

      \  street1: \"ras al\",\r

      \  city: \"Nablus\",\r

      \  country: \"Palestine\",\r

      };\r

      \r

      // Save the object as a string so it can be used in the Request Body and Tests\r

      pm.variables.set(\"requestBody\", JSON.stringify(requestBody));"
    language: text/javascript
  - type: afterResponse
    code: "const sentData = JSON.parse(pm.variables.get(\"requestBody\"));\r

      const receivedUser = pm.response.json();\r

      \r

      pm.test(\"Status code is 200\", function () {\r

      \    pm.response.to.have.status(200);\r

      });\r

      \r

      pm.test(\"Verify response matches sent body\", function () {\r

      \  pm.expect(receivedUser.firstName).to.eql(sentData.firstName);\r

      \  pm.expect(receivedUser.lastName).to.eql(sentData.lastName);\r

      \  pm.expect(receivedUser.email.toLowerCase()).to.eql(\r

      \    sentData.email.toLowerCase(),\r

      \  );\r

      \  pm.expect(receivedUser.phone).to.eql(sentData.phone);\r

      \  pm.expect(receivedUser.city).to.eql(sentData.city);\r

      });"
    language: text/javascript
order: 2000
