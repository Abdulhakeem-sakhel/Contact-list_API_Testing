$kind: http-request
url: "{{base_url}}/contacts/{{contactId}}"
method: PUT
body:
  type: json
  content: "{{requestBody}}"
auth:
  type: bearer
  credentials:
    token: "{{token}}"
scripts:
  - type: beforeRequest
    code: "const randomEmail = pm.variables.replaceIn(\"{{$randomEmail}}\");\r

      \r

      const postRequest = {\r

      \  url: pm.environment.get(\"base_url\") + \"/contacts\",\r

      \  method: 'POST',\r

      \  header: {\r

      \    'Content-Type': 'application/json',\r

      \    'Authorization': `Bearer ${pm.environment.get(\"token\")}`,\r

      \  },\r

      \  body: {\r

      \    mode: 'raw',\r

      \    raw: JSON.stringify({\r

      \        \"firstName\": \"Test\",\r

      \        \"lastName\": \"User\",\r

      \        \"email\": randomEmail,\r

      \        \"password\": \"myPassword\"\r

      \    })\r

      \  }\r

      };\r

      \r

      try {\r

      \    const res = await pm.sendRequest(postRequest);\r

      \    if (res.code == 201) {\r

      \        console.log(\"contact is created\");\r

      \    }\r

      \    pm.environment.set(\"contactId\", res.json()._id);\r

      } catch (err){\r

      \    console.log(err);\r

      }\r

      \r

      const deleteRequest = {\r

      \    url: pm.environment.get(\"base_url\") + \"/contacts/\" + pm.environment.get(\"contactId\"),\r

      \    method: \"DELETE\",\r

      \    header: {\r

      \    Authorization: `Bearer ${pm.environment.get(\"token\")}`,\r

      \    },\r

      };\r

      \r

      try {\r

      \    const res = await pm.sendRequest(deleteRequest);\r

      \    if (res.code == 200) {\r

      \        console.log(\"contact is deleted\");\r

      \    } else {\r

      \        console.error(\"the delation didn't work\");\r

      \    }\r

      } catch(err) {\r

      \    console.log(err)\r

      }\r

      \r

      let requestBody = {\r

      \  firstName: \"Abd\",\r

      \  lastName: \"Sakhel\",\r

      \  email: randomEmail,\r

      \  phone: \"8005554242\",\r

      \  street1: \"ras al\",\r

      \  city: \"Nablus\",\r

      \  country: \"Palestine\",\r

      };\r

      \r

      // Save the object as a string so it can be used in the Request Body and Tests\r

      pm.variables.set(\"requestBody\", JSON.stringify(requestBody));"
    language: text/javascript
  - type: afterResponse
    code: "const responseText = pm.response.text();\r

      \r

      pm.test(\"Status code is 404\", function () {\r

      \    pm.response.to.have.status(404);\r

      });\r

      \r

      pm.test(\"Response message should empty\", function() {\r

      \    pm.expect(responseText).to.be.empty\r

      });"
    language: text/javascript
order: 8000
