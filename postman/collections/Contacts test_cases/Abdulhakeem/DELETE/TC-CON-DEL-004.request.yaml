$kind: http-request
url: "{{base_url}}/contacts/{{contactId}}"
method: DELETE
auth:
  type: bearer
  credentials:
    token: "{{token}}"
scripts:
  - type: beforeRequest
    code: "const randomEmail = pm.variables.replaceIn(\"{{$randomEmail}}\");\r

      \r

      const postRequest = {\r

      \  url: pm.environment.get(\"base_url\") + \"/contacts\",\r

      \  method: \"POST\",\r

      \  header: {\r

      \    \"Content-Type\": \"application/json\",\r

      \    Authorization: `Bearer ${pm.environment.get(\"token\")}`,\r

      \  },\r

      \  body: {\r

      \    mode: \"raw\",\r

      \    raw: JSON.stringify({\r

      \      firstName: \"Test\",\r

      \      lastName: \"User\",\r

      \      email: randomEmail,\r

      \      password: \"myPassword\",\r

      \    }),\r

      \  },\r

      };\r

      \r

      pm.sendRequest(postRequest, (err, res) => {\r

      \  if (err) {\r

      \    console.log(\"Error creating contact:\", err);\r

      \  } else {\r

      \    const responseData = res.json();\r

      \    console.log(\"Contact created:\", responseData);\r

      \    \r

      \    pm.environment.set(\"contactId\", responseData._id);\r

      \r

      \    const deleteRequest = {\r

      \      url: pm.environment.get(\"base_url\") + \"/contacts/\" + responseData._id,\r

      \      method: \"DELETE\",\r

      \      header: {\r

      \        Authorization: `Bearer ${pm.environment.get(\"token\")}`,\r

      \      },\r

      \    };\r

      \r

      \    pm.sendRequest(deleteRequest, (deleteErr, deleteRes) => {\r

      \      if (deleteErr) {\r

      \        console.log(\"Error deleting contact:\", deleteErr);\r

      \      } else {\r

      \        console.log(\"Pre-request Delete Status:\", deleteRes.code);\r

      \      }\r

      \    });\r

      \  }\r

      });"
    language: text/javascript
  - type: afterResponse
    code: "const responseText = pm.response.text();\r

      \r

      pm.test(\"Status code is 404\", function () {\r

      \    pm.response.to.have.status(404);\r

      });\r

      \r

      pm.test(\"Response message should empty\", function() {\r

      \    pm.expect(responseText).to.be.empty\r

      });"
    language: text/javascript
order: 5000
