$kind: http-request
url: "{{base_url}}/contacts/{{contactId}}"
method: DELETE
auth:
  type: bearer
  credentials:
    token: "{{token}}"
scripts:
  - type: beforeRequest
    code: "const randomEmail = pm.variables.replaceIn(\"{{$randomEmail}}\");\r

      \r

      const postUserRequest = {\r

      \  url: pm.environment.get(\"base_url\") + \"/users\",\r

      \  method: 'POST',\r

      \  header: {\r

      \    'Content-Type': 'application/json'\r

      \  },\r

      \  body: {\r

      \    mode: 'raw',\r

      \    raw: JSON.stringify({\r

      \        \"firstName\": \"Test\",\r

      \        \"lastName\": \"User\",\r

      \        \"email\": randomEmail,\r

      \        \"password\": \"myPassword\"\r

      \    })\r

      \  }\r

      };\r

      try {\r

      \    const newUserRes = await pm.sendRequest(postUserRequest);\r

      \    const newToken = newUserRes.json().token;\r

      \    pm.environment.set(\"token\", newToken);\r

      } catch (err) {\r

      \    console.log(err)\r

      }\r

      \r

      const postContactsRequest = {\r

      \  url: pm.environment.get(\"base_url\") + \"/contacts\",\r

      \  method: 'POST',\r

      \  header: {\r

      \    'Content-Type': 'application/json',\r

      \    'Authorization': `Bearer ${pm.environment.get(\"token\")}`,\r

      \  },\r

      \  body: {\r

      \    mode: 'raw',\r

      \    raw: JSON.stringify({\r

      \        \"firstName\": \"Test\",\r

      \        \"lastName\": \"User\",\r

      \        \"email\": \"contact12test@test.com\",\r

      \        \"password\": \"myPassword\"\r

      \    })\r

      \  }\r

      };\r

      \r

      try {\r

      \    const newContactRes = await pm.sendRequest(postContactsRequest);\r

      \    const newContactid = newContactRes.json()._id;\r

      \    pm.environment.set('contactId', newContactid);\r

      \r

      } catch (err) {\r

      \    console.log(err)\r

      }\r

      \r

      const postUserLogOutRequest = {\r

      \    url: pm.environment.get(\"base_url\") + \"/users/logout\",\r

      \    method: 'POST',\r

      \    header: {\r

      \    'Content-Type': 'application/json',\r

      \    'Authorization': `Bearer ${pm.environment.get(\"token\")}`,\r

      \    },\r

      };\r

      \r

      try {\r

      \    const logoutRes = await pm.sendRequest(postUserLogOutRequest);\r

      \    console.log(logoutRes.code);\r

      } catch (err) {\r

      \    console.log(err)\r

      }\r

      \r\n"
    language: text/javascript
  - type: afterResponse
    code: "const responseText = pm.response.text();\r

      \r

      pm.test(\"Status code is 401\", function () {\r

      \    pm.response.to.have.status(401);\r

      });\r

      \r

      pm.test(\"Response message should mention Please authenticate\", function() {\r

      \    pm.expect(responseText).to.contain('Please authenticate');\r

      });"
    language: text/javascript
order: 7000
