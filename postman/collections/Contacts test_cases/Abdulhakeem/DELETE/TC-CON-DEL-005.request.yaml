$kind: http-request
url: "{{base_url}}/contacts/{{contactId}}"
method: DELETE
auth:
  type: bearer
  credentials:
    token: "{{invalid_token}}"
scripts:
  - type: beforeRequest
    code: "const randomEmail = pm.variables.replaceIn(\"{{$randomEmail}}\");\r

      \r

      const postRequest = {\r

      \  url: pm.environment.get(\"base_url\") + \"/contacts\",\r

      \  method: 'POST',\r

      \  header: {\r

      \    'Content-Type': 'application/json',\r

      \    'Authorization': `Bearer ${pm.environment.get(\"token\")}`,\r

      \  },\r

      \  body: {\r

      \    mode: 'raw',\r

      \    raw: JSON.stringify({\r

      \        \"firstName\": \"Test\",\r

      \        \"lastName\": \"User\",\r

      \        \"email\": randomEmail,\r

      \        \"password\": \"myPassword\"\r

      \    })\r

      \  }\r

      };\r

      \r

      pm.sendRequest(postRequest, (err, res) => {\r

      \    if (err) {\r

      \        console.log(err);\r

      \    } else {\r

      \        if (res.code === 201) {\r

      \            console.log(\"Contact created successfully:\", res.json());\r

      \            pm.environment.set(\"contactId\", res.json()._id);\r

      \        } else {\r

      \            // Log exactly what went wrong if it wasn't a 201\r

      \            console.error(\r

      \                \"Failed to create contact. Status:\",\r

      \                res.code,\r

      \                \"Response:\",\r

      \                res.text()\r

      \            );\r

      \            \r

      \        }\r

      \    }\r

      });\r

      \r

      pm.environment.set('invalid_token', 'abcef12341');"
    language: text/javascript
  - type: afterResponse
    code: "const responseText = pm.response.text();\r

      \r

      pm.test(\"Status code is 401\", function () {\r

      \    pm.response.to.have.status(401);\r

      });\r

      \r

      pm.test(\"Response message should mention Please authenticate\", function() {\r

      \    pm.expect(responseText).to.contain('Please authenticate');\r

      });"
    language: text/javascript
order: 6000
