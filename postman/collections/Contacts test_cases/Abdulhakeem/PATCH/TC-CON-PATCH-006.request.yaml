$kind: http-request
url: "{{base_url}}/contacts/{{contactId}}"
method: PATCH
body:
  type: json
  content: "{\r

    \    \"email\": \"testingabd@test.com\",\r

    \    \"phone\": \"0599956139\"\r

    }"
auth:
  type: bearer
  credentials:
    token: "{{token}}"
scripts:
  - type: beforeRequest
    code: "const randomEmail = pm.variables.replaceIn(\"{{$randomEmail}}\");\r

      \r

      const postRequest = {\r

      \  url: pm.environment.get(\"base_url\") + \"/contacts\",\r

      \  method: 'POST',\r

      \  header: {\r

      \    'Content-Type': 'application/json',\r

      \    'Authorization': `Bearer ${pm.environment.get(\"token\")}`,\r

      \  },\r

      \  body: {\r

      \    mode: 'raw',\r

      \    raw: JSON.stringify({\r

      \        \"firstName\": \"Test\",\r

      \        \"lastName\": \"User\",\r

      \        \"email\": randomEmail,\r

      \        \"password\": \"myPassword\"\r

      \    })\r

      \  }\r

      };\r

      \r

      try {\r

      \    const res = await pm.sendRequest(postRequest);\r

      \    if (res.code == 201) {\r

      \        console.log(\"contact is created\");\r

      \    }\r

      \    //pm.environment.set(\"contactId\", res.json()._id);\r

      } catch (err){\r

      \    console.log(err);\r

      }\r

      \r

      const logoutRequest = {\r

      \    url: pm.environment.get(\"base_url\") + \"/users/logout\",\r

      \    method: \"POST\",\r

      \    header: {\r

      \        Authorization: `Bearer ${pm.environment.get(\"token\")}`,\r

      \    },\r

      };\r

      \r

      try {\r

      \    const res = await pm.sendRequest(logoutRequest);\r

      \    if (res.code == 200) {\r

      \        console.log(\"user is log out\");\r

      \    } else {\r

      \        console.error(\"the logging off didn't work\");\r

      \    }\r

      } catch(err) {\r

      \    console.log(err)\r

      }\r\n"
    language: text/javascript
  - type: afterResponse
    code: "const responseText = pm.response.text();\r

      \r

      pm.test(\"Status code is 401\", function () {\r

      \    pm.response.to.have.status(401);\r

      });\r

      \r

      pm.test(\"Response message should mention Please authenticate\", function() {\r

      \    pm.expect(responseText).to.contain('Please authenticate');\r

      });"
    language: text/javascript
order: 7000
