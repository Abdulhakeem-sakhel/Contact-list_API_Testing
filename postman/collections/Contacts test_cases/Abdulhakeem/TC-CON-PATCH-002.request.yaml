$kind: http-request
url: "{{base_url}}/contacts/{{contactId}}"
method: PATCH
body:
  type: json
  content: "{\r

    \    \"email\": \"testingabd@test.com\",\r

    \    \"phone\": \"0599956139\"\r

    }"
auth:
  type: bearer
  credentials:
    token: "{{token}}"
scripts:
  - type: beforeRequest
    code: "const randomEmail = pm.variables.replaceIn(\"{{$randomEmail}}\");\r

      \r

      const postRequest = {\r

      \  url: pm.environment.get(\"base_url\") + \"/contacts\",\r

      \  method: 'POST',\r

      \  header: {\r

      \    'Content-Type': 'application/json',\r

      \    'Authorization': `Bearer ${pm.environment.get(\"token\")}`,\r

      \  },\r

      \  body: {\r

      \    mode: 'raw',\r

      \    raw: JSON.stringify({\r

      \        \"firstName\": \"Test\",\r

      \        \"lastName\": \"User\",\r

      \        \"email\": randomEmail,\r

      \        \"password\": \"myPassword\"\r

      \    })\r

      \  }\r

      };\r

      \r

      pm.sendRequest(postRequest, (err, res) => {\r

      \    if (err) {\r

      \        console.log(err);\r

      \    } else {\r

      \        if (res.code === 201) {\r

      \            console.log(\"Contact created successfully:\", res.json());\r

      \            pm.environment.set(\"contactId\", res.json()._id);\r

      \        } else {\r

      \            // Log exactly what went wrong if it wasn't a 201\r

      \            console.error(\r

      \                \"Failed to create contact. Status:\",\r

      \                res.code,\r

      \                \"Response:\",\r

      \                res.text()\r

      \            );\r

      \        }\r

      \    }\r

      });"
    language: text/javascript
  - type: afterResponse
    code: "const requestBody = JSON.parse(pm.request.body.toJSON().raw);\r

      const responseBody = pm.response.json();\r

      \r

      pm.test(\"Status code is 200\", function () {\r

      \    pm.response.to.have.status(200);\r

      });\r

      \r

      pm.test(\"Verifying the response modified values\", function () {\r

      \    for (const property in requestBody) {\r

      \        pm.expect(requestBody[property].toLowerCase()).to.eql(responseBo\
      dy[property].toLowerCase());\r

      \    }\r

      });"
    language: text/javascript
order: 9000
