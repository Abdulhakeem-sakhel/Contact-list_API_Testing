$kind: http-request
url: "{{base_url}}/users/login"
method: POST
body:
  type: json
  content: "{{body}}"
auth:
  type: noauth
scripts:
  - type: beforeRequest
    code: "const randomEmail = pm.variables.replaceIn(\"{{$randomEmail}}\");\r

      const randomPassword = pm.variables.replaceIn(\"{{$randomPassword}}\");\r

      \r

      \r

      let body = {\r

      \    email: randomEmail,\r

      \    password: 'not correct'\r

      }\r

      pm.variables.set('body', JSON.stringify(body));\r

      \r

      const userJson = {\r

      \    \"firstName\": \"Test\",\r

      \    \"lastName\": \"User\",\r

      \    \"email\": randomEmail,\r

      \    \"password\": randomPassword\r

      }\r

      \r

      \r

      const postUserRequest = {\r

      \  url: pm.environment.get(\"base_url\") + \"/users\",\r

      \  method: 'POST',\r

      \  header: {\r

      \    'Content-Type': 'application/json'\r

      \  },\r

      \  body: {\r

      \    mode: 'raw',\r

      \    raw: JSON.stringify(userJson)\r

      \  }\r

      };\r

      \r

      try {\r

      \    const res = await pm.sendRequest(postUserRequest);\r

      } catch (err) {\r

      \    console.log(err);\r

      }"
    language: text/javascript
  - type: afterResponse
    code: "const responseText = pm.response.text();\r

      \r

      pm.test(\"Status code is 401\", function () {\r

      \    pm.response.to.have.status(401);\r

      });\r

      pm.test(\"Response message should empty\", function() {\r

      \    pm.expect(responseText).to.be.empty\r

      });"
    language: text/javascript
order: 2000
