$kind: http-request
url: "{{base_url}}/users/login"
method: POST
body:
  type: json
  content: "{{body}}"
auth:
  type: noauth
scripts:
  - type: beforeRequest
    code: "const randomEmail = pm.variables.replaceIn(\"{{$randomEmail}}\");\r

      const randomPassword = pm.variables.replaceIn(\"{{$randomPassword}}\");\r

      \r

      \r

      let body = {\r

      \    email: randomEmail,\r

      \    password: randomPassword\r

      }\r

      pm.variables.set('body', JSON.stringify(body));\r

      \r

      const userJson = {\r

      \    \"firstName\": \"Test\",\r

      \    \"lastName\": \"User\",\r

      \    \"email\": randomEmail,\r

      \    \"password\": randomPassword\r

      }\r

      \r

      pm.variables.set('user_json', userJson);\r

      \r

      const postUserRequest = {\r

      \  url: pm.environment.get(\"base_url\") + \"/users\",\r

      \  method: 'POST',\r

      \  header: {\r

      \    'Content-Type': 'application/json'\r

      \  },\r

      \  body: {\r

      \    mode: 'raw',\r

      \    raw: JSON.stringify(userJson)\r

      \  }\r

      };\r

      \r

      try {\r

      \    const res = await pm.sendRequest(postUserRequest);\r

      } catch (err) {\r

      \    console.log(err);\r

      }"
    language: text/javascript
  - type: afterResponse
    code: "const userInfo = pm.response.json().user;\r

      \r

      pm.test(\"Status code is 200\", function () {\r

      \    pm.response.to.have.status(200);\r

      });\r

      \r

      pm.test(\"Verify the response values\", function() {\r

      \    pm.expect(userInfo.firstName).to.eql(pm.variables.get('user_json').firstName);\r

      \    pm.expect(userInfo.lastName).to.eql(pm.variables.get('user_json').lastName);\r

      \    pm.expect(userInfo.email).to.eql(pm.variables.get('user_json').email.toLowerCase());\r

      });\r\n"
    language: text/javascript
order: 1000
