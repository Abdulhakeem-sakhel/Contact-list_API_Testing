$kind: http-request
url: "{{base_url}}/users/logout"
method: POST
auth:
  type: bearer
  credentials:
    token: "{{token}}"
scripts:
  - type: afterResponse
    code: "const responseText = pm.response.text();\r

      \r

      pm.test(\"Status code is 200\", function () {\r

      \    pm.response.to.have.status(200);\r

      });\r

      pm.test(\"Response message should empty\", function() {\r

      \    pm.expect(responseText).to.be.empty\r

      });"
    language: text/javascript
  - type: beforeRequest
    code: "const randomEmail = pm.variables.replaceIn(\"{{$randomEmail}}\");\r

      \r

      const postUserRequest = {\r

      \  url: pm.environment.get(\"base_url\") + \"/users\",\r

      \  method: 'POST',\r

      \  header: {\r

      \    'Content-Type': 'application/json'\r

      \  },\r

      \  body: {\r

      \    mode: 'raw',\r

      \    raw: JSON.stringify({\r

      \        \"firstName\": \"Test\",\r

      \        \"lastName\": \"User\",\r

      \        \"email\": randomEmail,\r

      \        \"password\": \"myPassword\"\r

      \    })\r

      \  }\r

      };\r

      \r

      try {\r

      \    const res = await pm.sendRequest(postUserRequest);\r

      \    pm.environment.set('token', res.json().token);\r

      } catch (err) {\r

      \    console.log(err);\r

      }"
    language: text/javascript
order: 1000
