$kind: http-request
url: "{{base_url}}/users/me"
method: GET
body:
  type: json
  content: ""
auth:
  type: bearer
  credentials:
    token: "{{token}}"
scripts:
  - type: beforeRequest
    code: "pm.environment.set(\"token\", \"invalidToken\");\r\n"
    language: text/javascript
  - type: afterResponse
    code: "pm.test(\"Status code is 401\", function () {\r

      \    pm.response.to.have.status(401);\r

      });\r

      pm.test(\"Response time is less than 900ms\", function () {\r

      \    pm.expect(pm.response.responseTime).to.be.below(900);\r

      });\r

      \r

      const rText = pm.response.text();\r

      pm.test(\"Response message should mention error message :Please authenticate.\", function() {\r

      \   \r

      \    pm.expect(rText).to.contain(\"error\").and.to.contain(\"Please authenticate.\");\r

      });\r\n"
    language: text/javascript
order: 3000
