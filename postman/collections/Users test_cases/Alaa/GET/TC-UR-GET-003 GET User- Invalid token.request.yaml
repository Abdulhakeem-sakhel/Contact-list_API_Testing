$kind: http-request
url: "{{base_url}}/users/me"
method: GET
body:
  type: json
  content: ""
auth:
  type: bearer
  credentials:
    token: "{{token}}"
scripts:
  - type: beforeRequest
    code: pm.environment.set("token", "invalidToken");
    language: text/javascript
  - type: afterResponse
    code: "pm.test(\"Status code is 401\", function () {\r

      \    pm.response.to.have.status(401);\r

      });\r

      \r

      pm.test(\"Response contains error message\", function(){\r

      \    const jData=pm.response.json();\r

      \    pm.expect(jData).to.have.property(\"error\");})"
    language: text/javascript
order: 3000
