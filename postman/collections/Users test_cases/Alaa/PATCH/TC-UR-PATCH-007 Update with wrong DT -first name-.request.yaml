$kind: http-request
name: TC-UR-PATCH-007 Update with wrong DT "first name"
url: "{{base_url}}/users/me"
method: PATCH
body:
  type: json
  content: '{"firstName": 122}'
auth:
  type: bearer
  credentials:
    token: "{{token}}"
scripts:
  - type: afterResponse
    code: "\r

      \r

      pm.test(\"Status code is 400\", function () {\r

      \    pm.response.to.have.status(400);\r

      });\r

      \r

      pm.test(\"Response contains error message\", function(){\r

      \    const jData=pm.response.json();\r

      \    pm.expect(jData).to.have.property(\"message\");})\r

      \r\n"
    language: text/javascript
order: 7000
