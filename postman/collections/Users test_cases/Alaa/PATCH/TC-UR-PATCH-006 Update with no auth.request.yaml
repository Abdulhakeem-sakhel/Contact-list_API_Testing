$kind: http-request
url: "{{base_url}}/users/me"
method: PATCH
body:
  type: json
  content: '{"firstName": "Adham"}'
auth:
  type: noauth
scripts:
  - type: afterResponse
    code: "pm.test(\"Status code is 401\", function () {\r

      \    pm.response.to.have.status(401);\r

      });\r

      \r

      pm.test(\"Response contains error message\", function(){\r

      \    const jData=pm.response.json();\r

      \    pm.expect(jData).to.have.property(\"error\");\r

      \    })\r

      \    \r

      const responseText = pm.response.text();\r

      pm.test(\"Response message should mention Please authenticate\", function() {\r

      \    pm.expect(responseText).to.contain('Please authenticate');\r

      });"
    language: text/javascript
order: 6000
