$kind: http-request
url: "{{base_url}}/users/me"
method: PATCH
body:
  type: json
  content: "{\r\n    \"age\":20\r\n}"
auth:
  type: bearer
  credentials:
    token: "{{token}}"
scripts:
  - type: afterResponse
    code: "pm.test(\"Status code is 200\", function () {\r

      \    pm.response.to.have.status(200);\r

      });\r

      \r

      pm.test(\"Response body is correct\", function(){\r

      \    pm.expect(pm.response.json().firstName).to.eql(\"Adam\");\r

      \    pm.expect(pm.response.json().lastName).to.eql(\"2.9\");\r

      \    pm.expect(pm.response.json().email).to.eql(\"webster_erdman66@yahoo.com\");\r

      });\r

      \r

      pm.test(\"Response contains a user\", function(){\r

      \    const jData=pm.response.json();\r

      \    pm.expect(jData).to.have.property(\"_id\");\r

      \    })\r

      \r

      pm.test(\"Response time is less than 900ms\", function () {\r

      \    pm.expect(pm.response.responseTime).to.be.below(900);\r

      });"
    language: text/javascript
order: 5000
