$kind: http-request
url: "{{base_url}}/users/me"
method: PATCH
body:
  type: json
  content: '{"age":20}'
auth:
  type: bearer
  credentials:
    token: "{{token}}"
scripts:
  - type: afterResponse
    code: "pm.test(\"Status code is 200\", function () {\r

      \    pm.response.to.have.status(200);\r

      });\r

      \r

      pm.test(\"Response contains a user\", function(){\r

      \    const jData=pm.response.json();\r

      \    pm.expect(jData).to.have.property(\"_id\");})"
    language: text/javascript
order: 5000
