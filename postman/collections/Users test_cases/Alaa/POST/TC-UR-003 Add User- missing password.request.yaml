$kind: http-request
url: "{{base_url}}/users"
method: POST
body:
  type: json
  content: "{\"firstName\": \"Test\",\r

    \"lastName\": \"User\",\r

    \ \"email\": \"test@88fake.com\"\r

    \ \r

    \ }"
auth:
  type: bearer
  credentials:
    token: "{{token}}"
scripts:
  - type: afterResponse
    code: "var jsonData=pm.response;\r

      pm.environment.set('token', jsonData.token);\r

      \r

      pm.test(\"Status code is 400\", function () {\r

      \    pm.response.to.have.status(400);})\r

      \r

      pm.test(\"Response contains error message\", function(){\r

      \    const jData=pm.response.json();\r

      \    pm.expect(jData).to.have.property(\"message\");})\r

      \r

      const responseText = pm.response.text();\r

      pm.test(\"Response message should mention ValidatorError and password\",
      function() {\r

      \    pm.expect(responseText).to.contain(\"ValidatorError\").and.to.contai\
      n(\"password\");\r

      });\r

      \r\n"
    language: text/javascript
order: 3000
